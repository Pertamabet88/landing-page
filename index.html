    @keyframes float{

    .btn:hover{

      box-shadow:0 0 25px rgba(255,215,0,0.6);
    }

    .btn::before{
      content:'';
      position:absolute;
      top:0;
      left:-100%;

      height:100%;

    /* ANIMATION */

        transform:translateY(20px);

      }

    @keyframes fadeIn{
